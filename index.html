<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAM Program Database</title>

  <style>
    :root {
      --blue: #0056b8;
      --blue-dark: #003f88;
      --text: #1f2937;
      --muted: #5f6b7a;
      --line: #d9dee7;
      --bg: #f5f7fb;
      --card: #ffffff;
      --error-bg: #fff1f0;
      --error-border: #fecdca;
      --error-text: #b42318;
      --shadow: 0 2px 8px rgba(16, 24, 40, 0.10);
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      padding: 34px 28px;
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--blue);
      font-size: 36px;
      line-height: 1.2;
    }

    .intro {
      margin: 0;
      max-width: 920px;
      color: var(--muted);
      font-size: 17px;
    }

    main {
      max-width: 1280px;
      margin: 30px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 330px 1fr;
      gap: 28px;
    }

    aside {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      height: fit-content;
      position: sticky;
      top: 20px;
    }

    aside h2 {
      margin: 0 0 18px;
      color: var(--blue-dark);
      font-size: 22px;
    }

    .filter-group { margin-bottom: 18px; }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 7px;
      color: #111827;
    }

    select,
    input[type="search"],
    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px 11px;
      font-size: 15px;
      background: #ffffff;
      color: var(--text);
    }

    select:focus,
    input[type="search"]:focus {
      outline: 2px solid rgba(0, 86, 184, 0.22);
      border-color: var(--blue);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 7px;
      padding: 11px 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--blue);
      color: white;
    }

    .primary:hover { background: var(--blue-dark); }

    .secondary {
      background: #eef2f6;
      color: #344054;
    }

    .secondary:hover { background: #e1e7ee; }

    .source-note,
    .upload-note {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }

    .source-note code {
      display: inline-block;
      max-width: 100%;
      overflow-wrap: anywhere;
      color: #344054;
      background: #f2f4f7;
      border-radius: 5px;
      padding: 2px 5px;
    }

    .error {
      color: var(--error-text);
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      padding: 11px 12px;
      border-radius: 7px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .content {
      min-width: 0;
    }

    .toolbar {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .toolbar h2 {
      margin: 0;
      color: var(--blue-dark);
      font-size: 22px;
    }

    .sort-box {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .sort-box label {
      margin: 0;
      white-space: nowrap;
    }

    .sort-box select { min-width: 180px; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 34px 42px;
      margin-bottom: 22px;
    }

    .card-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .card h2 {
      margin: 0;
      color: var(--blue);
      font-size: 30px;
      line-height: 1.25;
    }

    .card h2 a {
      color: var(--blue);
      text-decoration: none;
    }

    .card h2 a:hover {
      text-decoration: underline;
    }

    .arrow {
      color: var(--blue);
      font-size: 58px;
      line-height: 0.8;
      font-weight: 700;
    }

    .description {
      margin: 26px 0 0;
      max-width: 960px;
      font-size: 21px;
      line-height: 1.7;
      color: #252a34;
      white-space: pre-line;
    }

    .divider {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 30px 0 26px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px 54px;
    }

    .meta-item {
      display: grid;
      grid-template-columns: 44px 150px 1fr;
      align-items: center;
      column-gap: 14px;
      min-width: 0;
    }

    .icon {
      width: 32px;
      height: 32px;
      color: #555b66;
    }

    .meta-label {
      font-weight: 700;
      font-size: 18px;
      color: #111827;
      white-space: nowrap;
    }

    .meta-value {
      font-size: 18px;
      color: #252a34;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .empty {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 42px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 17px;
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      aside { position: static; }

      .card { padding: 28px 24px; }

      .description { font-size: 18px; }

      .meta-grid { grid-template-columns: 1fr; }

      .meta-item {
        grid-template-columns: 38px 140px 1fr;
      }
    }

    @media (max-width: 600px) {
      header { padding: 28px 20px; }
      main { padding: 0 14px; }
      h1 { font-size: 29px; }
      .card h2 { font-size: 24px; }
      .arrow { font-size: 44px; }
      .meta-item {
        grid-template-columns: 34px 1fr;
        grid-template-areas:
          "icon label"
          "icon value";
        align-items: start;
      }
      .icon { grid-area: icon; }
      .meta-label { grid-area: label; font-size: 16px; }
      .meta-value { grid-area: value; font-size: 16px; }
      .sort-box { width: 100%; }
      .sort-box select { flex: 1; min-width: 0; }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <h1 id="pageTitle">TAM Program Database</h1>
      <p class="intro" id="introText">
        Search and filter TAM support programs by category, sub-category,
        career level, audience, and location.
      </p>
    </div>
  </header>

  <main>
    <aside>
      <h2>Filter programs</h2>

      <div id="errorBox"></div>

      <div class="filter-group">
        <label for="categoryFilter">Category</label>
        <select id="categoryFilter"><option value="">All categories</option></select>
      </div>

      <div class="filter-group">
        <label for="subcategoryFilter">Sub-category</label>
        <select id="subcategoryFilter"><option value="">All sub-categories</option></select>
      </div>

      <div class="filter-group">
        <label for="careerFilter">Career Levels</label>
        <select id="careerFilter"><option value="">All career levels</option></select>
      </div>

      <div class="filter-group">
        <label for="audienceFilter">Audience</label>
        <select id="audienceFilter"><option value="">All audiences</option></select>
      </div>

      <div class="filter-group">
        <label for="locationFilter">Location</label>
        <select id="locationFilter"><option value="">All locations</option></select>
      </div>

      <div class="filter-group">
        <label for="searchInput">Program title / description</label>
        <input id="searchInput" type="search" placeholder="Search programs..." />
      </div>

      <div class="button-row">
        <button class="primary" id="applyBtn">Apply</button>
        <button class="secondary" id="resetBtn">Reset</button>
      </div>

      <div class="source-note" id="sourceNote">
        Data source: <code id="sourceLabel">loading...</code>
      </div>
    </aside>

    <section class="content">
      <div class="toolbar">
        <h2 id="resultCount">Loading programs...</h2>

        <div class="sort-box">
          <label for="sortSelect">Sort</label>
          <select id="sortSelect">
            <option value="program-asc">Program A–Z</option>
            <option value="program-desc">Program Z–A</option>
            <option value="location-asc">Location A–Z</option>
            <option value="category-asc">Category A–Z</option>
          </select>
        </div>
      </div>

      <div id="cards"></div>
    </section>
  </main>

  <script>
    /**********************************************************************
     * PAGES CMS SETTINGS
     *
     * This file can be edited visually through Pages CMS:
     * content/site.json
     *
     * The program database itself is still loaded from Google Sheets.
     **********************************************************************/

    const SITE_SETTINGS_FILE = "content/site.json";

    let GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRx28JA6xFzpUiRiUKAHvouNLuqQ_DwEWXjrM4AAwUmqCwrCZgWrrs4W26eumssDg/pub?output=csv";

    let LOCAL_CSV_FILE = "data1.csv";

    // Adds a timestamp to reduce browser caching, so edits in Google Sheets or Pages CMS appear after refresh.
    const CACHE_BUST = true;

    const FIXED_COLUMNS = [
      "No.",
      "Program",
      "Link",
      "URL",
      "Website",
      "Details",
      "Category",
      "Career Levels",
      "Audience",
      "Location",
      "Description"
    ];

    const LINK_COLUMN_ALIASES = [
      "Link",
      "Links",
      "URL",
      "Url",
      "Website",
      "Website Link",
      "Details",
      "Detail Link",
      "Program Link",
      "Programme Link",
      "Program URL",
      "Program Website",
      "Source",
      "Source Link"
    ];

    const EXCLUDED_FILTER_VALUES = {
      career: new Set(["ECR"]),
      audience: new Set(["All researchers"]),
      location: new Set(["All sites"])
    };

    let programs = [];
    let subcategoryColumns = [];

    const el = {
      pageTitle: document.getElementById("pageTitle"),
      introText: document.getElementById("introText"),
      category: document.getElementById("categoryFilter"),
      subcategory: document.getElementById("subcategoryFilter"),
      career: document.getElementById("careerFilter"),
      audience: document.getElementById("audienceFilter"),
      location: document.getElementById("locationFilter"),
      search: document.getElementById("searchInput"),
      sort: document.getElementById("sortSelect"),
      cards: document.getElementById("cards"),
      resultCount: document.getElementById("resultCount"),
      errorBox: document.getElementById("errorBox"),
      applyBtn: document.getElementById("applyBtn"),
      resetBtn: document.getElementById("resetBtn"),
      sourceLabel: document.getElementById("sourceLabel")
    };

    el.applyBtn.addEventListener("click", render);
    el.resetBtn.addEventListener("click", resetFilters);
    el.sort.addEventListener("change", render);
    el.search.addEventListener("input", render);

    [el.category, el.subcategory, el.career, el.audience, el.location].forEach(select => {
      select.addEventListener("change", render);
    });

    async function loadSiteSettings() {
      try {
        const response = await fetch(addCacheBust(SITE_SETTINGS_FILE), { cache: "no-store" });

        if (!response.ok) {
          console.warn("No content/site.json found. Using default settings from index.html.");
          return;
        }

        const settings = await response.json();

        if (settings.pageTitle) {
          document.title = settings.pageTitle;
          el.pageTitle.textContent = settings.pageTitle;
        }

        if (settings.introText) {
          el.introText.textContent = settings.introText;
        }

        if (settings.googleSheetCsvUrl !== undefined) {
          GOOGLE_SHEET_CSV_URL = settings.googleSheetCsvUrl;
        }

        if (settings.localCsvFile) {
          LOCAL_CSV_FILE = settings.localCsvFile;
        }
      } catch (error) {
        console.warn("Site settings could not be loaded. Using default settings from index.html.");
      }
    }

    async function init() {
      await loadSiteSettings();

      const source = getDataSourceURL();
      el.sourceLabel.textContent = source.label;

      try {
        const response = await fetch(source.url, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        loadFromCSVText(text);
        clearError();
      } catch (error) {
        programs = [];
        render();
        showError(
          "Could not load the database. If you are using Google Sheets, check that the sheet is published to the web and that the CSV URL is pasted correctly. If you are using local fallback, make sure data1.csv is in the same folder as index.html."
        );
      }
    }

    function getDataSourceURL() {
      const params = new URLSearchParams(window.location.search);
      const csvFromURL = params.get("csv");

      if (csvFromURL) {
        return {
          url: addCacheBust(csvFromURL),
          label: "URL parameter csv"
        };
      }

      const configuredGoogleURL = GOOGLE_SHEET_CSV_URL.trim();
      const hasGoogleURL =
        configuredGoogleURL &&
        !configuredGoogleURL.includes("PASTE_YOUR_GOOGLE_SHEETS_CSV_URL_HERE");

      if (hasGoogleURL) {
        return {
          url: addCacheBust(configuredGoogleURL),
          label: "Google Sheets"
        };
      }

      return {
        url: addCacheBust(LOCAL_CSV_FILE),
        label: LOCAL_CSV_FILE
      };
    }

    function addCacheBust(url) {
      if (!CACHE_BUST) return url;
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}_=${Date.now()}`;
    }

    function loadFromCSVText(csvText) {
      const parsed = parseCSV(csvText);

      if (parsed.length === 0) {
        programs = [];
        subcategoryColumns = [];
        populateFilters();
        render();
        return;
      }

      const headers = Object.keys(parsed[0]);
      validateRequiredColumns(headers);

      const linkColumn = findLinkColumn(headers, parsed);

      subcategoryColumns = headers.filter(header => {
        if (!header) return false;
        if (header === linkColumn) return false;
        if (FIXED_COLUMNS.includes(header)) return false;
        if (LINK_COLUMN_ALIASES.includes(header)) return false;
        return true;
      });

      programs = parsed
        .map(row => ({
          no: clean(row["No."]),
          program: clean(row["Program"]),
          link: normalizeURL(extractURL(clean(linkColumn ? row[linkColumn] : ""))),
          category: clean(row["Category"]),
          careerLevels: clean(row["Career Levels"]),
          audience: clean(row["Audience"]),
          location: clean(row["Location"]),
          description: clean(row["Description"]),
          subcategories: subcategoryColumns.filter(col => isSelectedFlag(row[col]))
        }))
        .filter(program => program.program || program.description);

      populateFilters();
      render();
    }

    function validateRequiredColumns(headers) {
      const required = ["Program", "Category", "Career Levels", "Audience", "Location", "Description"];
      const missing = required.filter(column => !headers.includes(column));
      if (missing.length > 0) {
        throw new Error(`Missing required columns: ${missing.join(", ")}`);
      }
    }

    function findLinkColumn(headers, rows) {
      const exactAlias = LINK_COLUMN_ALIASES.find(alias => headers.includes(alias));
      if (exactAlias) return exactAlias;

      const fuzzyAlias = headers.find(header => {
        const normalized = clean(header).toLowerCase();
        return normalized.includes("link") ||
               normalized.includes("url") ||
               normalized.includes("website");
      });
      if (fuzzyAlias) return fuzzyAlias;

      // Fallback for your current structure: column C is the link column.
      // Array index 2 means the third CSV column.
      const thirdColumn = headers[2] || null;
      if (thirdColumn && rows.some(row => looksLikeURL(clean(row[thirdColumn])))) {
        return thirdColumn;
      }

      return null;
    }

    function extractURL(value) {
      const text = clean(value);
      if (!text) return "";

      // Supports cells that contain formulas such as:
      // =HYPERLINK("https://example.com","Program title")
      const hyperlinkFormulaMatch = text.match(/HYPERLINK\(["']([^"']+)["']/i);
      if (hyperlinkFormulaMatch) return hyperlinkFormulaMatch[1];

      // Supports cells that contain a raw URL, or text containing a URL.
      const rawURLMatch = text.match(/https?:\/\/[^\s"'<>]+/i);
      if (rawURLMatch) return rawURLMatch[0];

      const wwwURLMatch = text.match(/www\.[^\s"'<>]+/i);
      if (wwwURLMatch) return wwwURLMatch[0];

      return text;
    }

    function looksLikeURL(value) {
      return /https?:\/\//i.test(value) || /www\./i.test(value) || /HYPERLINK\(/i.test(value);
    }

    function normalizeURL(value) {
      const url = clean(value).replace(/^["']|["']$/g, "");
      if (!url) return "";
      if (/^https?:\/\//i.test(url)) return url;
      if (/^www\./i.test(url)) return `https://${url}`;
      return "";
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      text = String(text || "").replace(/^\uFEFF/, "");

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell);
          if (row.some(value => clean(value) !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      row.push(cell);
      if (row.some(value => clean(value) !== "")) rows.push(row);

      if (rows.length < 2) return [];

      const headers = rows[0].map(header => clean(header));

      return rows.slice(1).map(values => {
        const obj = {};
        headers.forEach((header, index) => {
          obj[header] = values[index] ?? "";
        });
        return obj;
      });
    }

    function populateFilters() {
      populateSelect(el.category, unique(programs.map(p => p.category)), "All categories");
      populateSelect(el.subcategory, subcategoryColumns, "All sub-categories");
      populateSelect(el.career, uniqueMulti(programs.map(p => p.careerLevels)), "All career levels", EXCLUDED_FILTER_VALUES.career);
      populateSelect(el.audience, uniqueMulti(programs.map(p => p.audience)), "All audiences", EXCLUDED_FILTER_VALUES.audience);
      populateSelect(el.location, unique(programs.map(p => p.location)), "All locations", EXCLUDED_FILTER_VALUES.location);
    }

    function populateSelect(select, values, defaultText, excludedValues = new Set()) {
      const current = select.value;
      select.innerHTML = "";

      const defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.textContent = defaultText;
      select.appendChild(defaultOption);

      values
        .filter(Boolean)
        .filter(value => !excludedValues.has(value))
        .sort((a, b) => a.localeCompare(b))
        .forEach(value => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        });

      if ([...select.options].some(option => option.value === current)) {
        select.value = current;
      }
    }

    function render() {
      let filtered = programs.filter(program => {
        const categoryOK = !el.category.value || program.category === el.category.value;
        const subcategoryOK = !el.subcategory.value || program.subcategories.includes(el.subcategory.value);
        const careerOK = !el.career.value || splitMulti(program.careerLevels).includes(el.career.value);
        const audienceOK = !el.audience.value || splitMulti(program.audience).includes(el.audience.value);
        const locationOK = !el.location.value || program.location === el.location.value;

        const query = el.search.value.trim().toLowerCase();
        const searchOK =
          !query ||
          program.program.toLowerCase().includes(query) ||
          program.description.toLowerCase().includes(query) ||
          program.category.toLowerCase().includes(query) ||
          program.careerLevels.toLowerCase().includes(query) ||
          program.audience.toLowerCase().includes(query) ||
          program.location.toLowerCase().includes(query) ||
          program.subcategories.join(" ").toLowerCase().includes(query);

        return categoryOK && subcategoryOK && careerOK && audienceOK && locationOK && searchOK;
      });

      filtered = sortPrograms(filtered);

      el.resultCount.textContent = filtered.length === 1 ? "1 program found" : `${filtered.length} programs found`;

      if (filtered.length === 0) {
        el.cards.innerHTML = `<div class="empty">No programs match your current filter selection.</div>`;
        return;
      }

      el.cards.innerHTML = filtered.map(cardHTML).join("");
    }

    function sortPrograms(items) {
      const sort = el.sort.value;

      return [...items].sort((a, b) => {
        if (sort === "program-asc") return a.program.localeCompare(b.program);
        if (sort === "program-desc") return b.program.localeCompare(a.program);
        if (sort === "location-asc") return a.location.localeCompare(b.location) || a.program.localeCompare(b.program);
        if (sort === "category-asc") return a.category.localeCompare(b.category) || a.program.localeCompare(b.program);
        return 0;
      });
    }

    function cardHTML(program) {
      const subcategoryText = program.subcategories.length > 0 ? program.subcategories.join(", ") : "Not specified";
      const description = program.description || "No description available.";

      return `
        <article class="card">
          <div class="card-title-row">
            <h2>${programTitleHTML(program)}</h2>
            ${program.link ? `<a class="arrow" href="${escapeAttribute(program.link)}" target="_blank" rel="noopener noreferrer" aria-label="Open program link">›</a>` : `<span class="arrow" aria-hidden="true">›</span>`}
          </div>

          <p class="description">${escapeHTML(description)}</p>

          <hr class="divider" />

          <div class="meta-grid">
            <div class="meta-item">
              ${iconGraduation()}
              <div class="meta-label">Category:</div>
              <div class="meta-value">${escapeHTML(program.category || "Not specified")}</div>
            </div>

            <div class="meta-item">
              ${iconLocation()}
              <div class="meta-label">Location:</div>
              <div class="meta-value">${escapeHTML(program.location || "Not specified")}</div>
            </div>

            <div class="meta-item">
              ${iconCalendar()}
              <div class="meta-label">Career Levels:</div>
              <div class="meta-value">${escapeHTML(program.careerLevels || "Not specified")}</div>
            </div>

            <div class="meta-item">
              ${iconUser()}
              <div class="meta-label">Audience:</div>
              <div class="meta-value">${escapeHTML(program.audience || "Not specified")}</div>
            </div>

            <div class="meta-item">
              ${iconInstitution()}
              <div class="meta-label">Sub-category:</div>
              <div class="meta-value">${escapeHTML(subcategoryText)}</div>
            </div>
          </div>
        </article>
      `;
    }

    function programTitleHTML(program) {
      const title = escapeHTML(program.program || "Untitled program");
      if (!program.link) return title;
      return `<a href="${escapeAttribute(program.link)}" target="_blank" rel="noopener noreferrer">${title}</a>`;
    }

    function escapeAttribute(value) {
      return escapeHTML(value);
    }

    function resetFilters() {
      el.category.value = "";
      el.subcategory.value = "";
      el.career.value = "";
      el.audience.value = "";
      el.location.value = "";
      el.search.value = "";
      el.sort.value = "program-asc";
      render();
    }

    function clean(value) {
      return String(value ?? "").trim();
    }

    function isSelectedFlag(value) {
      const v = clean(value).toLowerCase();
      return v === "1" || v === "yes" || v === "true" || v === "x";
    }

    function unique(values) {
      return [...new Set(values.map(clean).filter(Boolean))];
    }

    function uniqueMulti(values) {
      const all = [];
      values.forEach(value => splitMulti(value).forEach(part => all.push(part)));
      return unique(all);
    }

    function splitMulti(value) {
      return clean(value)
        .split(/[;,/|]/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function escapeHTML(value) {
      return clean(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showError(message) {
      el.errorBox.innerHTML = `<div class="error">${escapeHTML(message)}</div>`;
    }

    function clearError() {
      el.errorBox.innerHTML = "";
    }

    function iconGraduation() {
      return `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10L12 5 2 10l10 5 10-5z"></path>
          <path d="M6 12v5c3 2 9 2 12 0v-5"></path>
          <path d="M22 10v6"></path>
        </svg>`;
    }

    function iconCalendar() {
      return `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="17" rx="2"></rect>
          <path d="M8 2v4"></path>
          <path d="M16 2v4"></path>
          <path d="M3 9h18"></path>
        </svg>`;
    }

    function iconInstitution() {
      return `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 21h18"></path>
          <path d="M4 10h16"></path>
          <path d="M5 10v11"></path>
          <path d="M9 10v11"></path>
          <path d="M15 10v11"></path>
          <path d="M19 10v11"></path>
          <path d="M12 3L3 8h18L12 3z"></path>
        </svg>`;
    }

    function iconLocation() {
      return `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 12-9 12S3 17 3 10a9 9 0 1 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>`;
    }

    function iconUser() {
      return `
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>`;
    }

    init();
  </script>
</body>
</html>
