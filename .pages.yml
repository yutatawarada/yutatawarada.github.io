media: media

content:
  - name: site
    label: Site settings
    type: file
    path: content/site.json
    fields:
      - name: pageTitle
        label: Page title
        type: string
        required: true

      - name: introText
        label: Intro text
        type: text

      - name: googleSheetCsvUrl
        label: Google Sheet CSV URL
        type: string

      - name: localCsvFile
        label: Local fallback CSV file
        type: string
